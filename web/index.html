<!DOCTYPE html>
<html>
<head>
  <!-- 1. Cache-Control Meta Tags: Disables the browser from holding an outdated index.html shell -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  
  <!-- 2. SEO & Search Result Metadata (Fixes the "A new Flutter project" layout line) -->
  <title>উকিল - advocate.ukil.com.bd</title>
  <meta name="description" content="উকিল (Ukil) - Digital legal assistance and professional advocate management platform.">
  <meta name="keywords" content="উকিল, ukil, advocate, legal assistance, bangladesh">

  <!-- 3. Social Media & Link Preview Assets (Banner/Logo Placements) -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://advocate.ukil.com.bd/">
  <meta property="og:title" content="উকিল - advocate.ukil.com.bd">
  <meta property="og:description" content="Digital legal assistance and professional advocate management platform.">
  <meta property="og:image" content="https://advocate.ukil.com.bd/logo.png">

  <!-- Twitter Card Data -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="উকিল - advocate.ukil.com.bd">
  <meta name="twitter:description" content="Digital legal assistance and professional advocate management platform.">
  <meta name="twitter:image" content="https://advocate.ukil.com.bd/logo.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="উকিল">
  <link rel="apple-touch-icon" href="logo.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="logo.png"/>

  <!-- 4. Manifest Cache Buster -->
  <link rel="manifest" href="manifest.json?v=20260622_v1">

  <script>
    // 5. Automated Service Worker Verification & Force-Reload Loop
    if ('serviceWorker' in navigator) {
      // Directs waiting background workers to take control instantly
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          if (registration.waiting) {
            registration.waiting.postMessage({ type: 'SKIP_WAITING' });
          }
          registration.update();
        }
      });

      // Forces an automatic window refresh the split-second a new service worker takes over
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (!refreshing) {
          refreshing = true;
          window.location.reload();
        }
      });
    }
  </script>
</head>
<body>
  <!-- 
    6. Main Script Entry Cache Buster:
    Automatically rewrites its timestamp sequence via the CMD pipeline below.
  -->
  <script src="flutter_bootstrap.js?v=20260622_v1" async></script>
</body>
</html>
